name: Nix Flake actions

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v16
        with:
          name: pyproject-nix
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build check
        run: nix build -v -L .#checks.x86_64-linux.cpython-3_14_0

  collect:
    runs-on: ubuntu-latest
    needs:
      - nix-check
    steps:
      - run: true
